services:
  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    ports:
      - "127.0.0.1:8001:8000"
    env_file:
      - ../.env
    environment:
      - FRONTEND_URL=https://tradelikeme.xyz
      - SUPABASE_DATABASE_URL=${SUPABASE_DATABASE_URL}
    networks:
      - default
      - supabase_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m

  auth:
    build:
      context: ../auth
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3002:3001"
    env_file:
      - ../.env
    environment:
      - SUPABASE_DB_URL=${SUPABASE_DATABASE_URL}
      - BETTER_AUTH_URL=https://auth.tradelikeme.xyz
    networks:
      - default
      - supabase_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m

  agent:
    build:
      context: ..
      dockerfile: infra/Dockerfile.agent
    env_file:
      - ../.env
    environment:
      - STRATEGY_ID=sd_zones
    volumes:
      - agent_data:/app/data
    networks:
      - default
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "trading_agent"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2g

  # ─────────────────────────────────────────────────────────
  # Dograh Voice Support — local dev only (port 3010)
  # Full stack: postgres + redis + minio + api + ui
  # Configure LLM/STT/TTS at http://localhost:3010/model-configurations
  # ─────────────────────────────────────────────────────────
  dograh-postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - dograh_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - dograh-net
    profiles:
      - dograh

  dograh-redis:
    image: redis:7
    command: --requirepass redissecret
    volumes:
      - dograh_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redissecret", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10
    networks:
      - dograh-net
    profiles:
      - dograh

  dograh-minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - dograh_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dograh-net
    profiles:
      - dograh

  dograh-api:
    image: dograhai/dograh-api:latest
    environment:
      ENVIRONMENT: "local"
      LOG_LEVEL: "INFO"
      BACKEND_API_ENDPOINT: "http://localhost:8000"
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@dograh-postgres:5432/postgres"
      REDIS_URL: "redis://:redissecret@dograh-redis:6379"
      ENABLE_AWS_S3: "false"
      MINIO_ENDPOINT: "dograh-minio:9000"
      MINIO_PUBLIC_ENDPOINT: "http://localhost:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET: "voice-audio"
      MINIO_SECURE: "false"
      OSS_JWT_SECRET: "local-dev-change-in-production"
      ENABLE_TELEMETRY: "false"
      FASTAPI_WORKERS: "1"
    ports:
      - "0.0.0.0:8010:8000"
    depends_on:
      dograh-postgres:
        condition: service_healthy
      dograh-redis:
        condition: service_healthy
      dograh-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health').read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dograh-net
    profiles:
      - dograh

  dograh-ui:
    image: dograhai/dograh-ui:latest
    environment:
      BACKEND_URL: "http://api:8000"
      NODE_ENV: "oss"
      ENABLE_TELEMETRY: "false"
    # 'api' alias maps to dograh-api container via network alias (Next.js rewrites use 'api:8000')
    links:
      - "dograh-api:api"
    ports:
      - "3010:3010"
    depends_on:
      dograh-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3010 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - dograh-net
    profiles:
      - dograh

networks:
  default: {}
  supabase_default:
    external: true
  dograh-net:
    driver: bridge

volumes:
  agent_data:
  dograh_postgres_data:
  dograh_redis_data:
  dograh_minio_data:
