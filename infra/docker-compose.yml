services:
  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    ports:
      - "8001:8000"
    env_file:
      - ../.env
    environment:
      - FRONTEND_URL=https://tradelikeme.xyz
      - SUPABASE_DATABASE_URL=postgresql://postgres:dbd282441d621e3563efdc079a0c3198@supabase-db:5432/postgres
    networks:
      - default
      - supabase_default
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.tradelikeme.xyz`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"

  agent:
    build:
      context: ..
      dockerfile: infra/Dockerfile.agent
    env_file:
      - ../.env
    environment:
      - STRATEGY_ID=sd_zones
    volumes:
      - agent_data:/app/data
    networks:
      - default
    restart: unless-stopped
    depends_on:
      - backend

networks:
  default: {}
  supabase_default:
    external: true

volumes:
  agent_data:
