services:
  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    ports:
      - "8001:8000"
    env_file:
      - ../.env
    environment:
      - FRONTEND_URL=https://tradelikeme.xyz
      - SUPABASE_DATABASE_URL=postgresql://postgres:dbd282441d621e3563efdc079a0c3198@supabase-db:5432/postgres
    networks:
      - default
      - supabase_default
    restart: unless-stopped

  auth:
    build:
      context: ../auth
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ../.env
    environment:
      - SUPABASE_DB_URL=postgresql://postgres:dbd282441d621e3563efdc079a0c3198@supabase-db:5432/postgres
      - BETTER_AUTH_URL=https://auth.tradelikeme.xyz
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=Host(`auth.tradelikeme.xyz`)"
      - "traefik.http.routers.auth.entrypoints=websecure"
      - "traefik.http.routers.auth.tls.certresolver=letsencrypt"
      - "traefik.http.services.auth.loadbalancer.server.port=3001"
    networks:
      - default
      - supabase_default
    restart: unless-stopped

  agent:
    build:
      context: ..
      dockerfile: infra/Dockerfile.agent
    env_file:
      - ../.env
    environment:
      - STRATEGY_ID=sd_zones
    volumes:
      - agent_data:/app/data
    networks:
      - default
    restart: unless-stopped
    depends_on:
      - backend

networks:
  default: {}
  supabase_default:
    external: true

volumes:
  agent_data:
