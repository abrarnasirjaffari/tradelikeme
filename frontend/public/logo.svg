<svg xmlns="http://www.w3.org/2000/svg" width="320" height="72" viewBox="0 0 320 72">
  <defs>
    <!-- Glass pill border gradient (top+bottom white glow) -->
    <linearGradient id="pill-border" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="20%"  stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="40%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="80%"  stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.45"/>
    </linearGradient>
    <!-- Top sheen inside pill -->
    <linearGradient id="pill-sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Outer glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="320" height="72" rx="10" fill="#08080f"/>

  <!-- Outer soft glow behind pill -->
  <rect x="20" y="14" width="280" height="44" rx="22" fill="#863bff" fill-opacity="0.12" filter="url(#glow)"/>

  <!-- Glass pill body -->
  <rect x="20" y="14" width="280" height="44" rx="22" fill="#0a0a14" fill-opacity="0.72"/>

  <!-- Top sheen -->
  <rect x="21.4" y="15.4" width="277.2" height="20" rx="20" fill="url(#pill-sheen)"/>

  <!-- Pill border using gradient stroke -->
  <rect x="20" y="14" width="280" height="44" rx="22" fill="none" stroke="url(#pill-border)" stroke-width="1.4"/>

  <!-- "TradeLikeMe" text -->
  <text
    x="160"
    y="42"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Instrument Serif', Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-size="22"
    fill="#ffffff"
    letter-spacing="-0.5"
  >TradeLikeMe</text>
</svg>
